<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FlowLedger — Sign In</title>
  <meta name="description" content="Sign in or create your FlowLedger account." />
  <meta name="theme-color" content="#01696f" />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet" />
  <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
  <style>
    :root,[data-theme="light"]{
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
      --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
      --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
      --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
      --space-12:3rem;--space-16:4rem;
      --color-bg:#f7f6f2;
      --color-surface:#f9f8f5;
      --color-surface-2:#fbfbf9;
      --color-surface-offset:#f3f0ec;
      --color-border:#d4d1ca;
      --color-divider:#dcd9d5;
      --color-text:#28251d;
      --color-text-muted:#7a7974;
      --color-text-faint:#bab9b4;
      --color-text-inverse:#f9f8f4;
      --color-primary:#01696f;
      --color-primary-hover:#0c4e54;
      --color-primary-active:#0f3638;
      --color-primary-highlight:#cedcd8;
      --color-error:#a12c7b;
      --color-error-highlight:#e0ced7;
      --color-success:#437a22;
      --color-success-highlight:#d4dfcc;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;
      --radius-xl:1rem;--radius-2xl:1.25rem;--radius-full:9999px;
      --shadow-sm:0 1px 2px rgba(40,37,29,.06);
      --shadow-md:0 8px 28px rgba(40,37,29,.09);
      --shadow-lg:0 20px 48px rgba(40,37,29,.12);
      --font-body:"Satoshi",sans-serif;
      --ease:cubic-bezier(.16,1,.3,1);
      --transition:180ms var(--ease);
    }
    [data-theme="dark"]{
      --color-bg:#171614;
      --color-surface:#1c1b19;
      --color-surface-2:#201f1d;
      --color-surface-offset:#1d1c1a;
      --color-border:#393836;
      --color-divider:#262523;
      --color-text:#cdccca;
      --color-text-muted:#979591;
      --color-text-faint:#5a5957;
      --color-text-inverse:#2b2a28;
      --color-primary:#4f98a3;
      --color-primary-hover:#68aab4;
      --color-primary-active:#227f8b;
      --color-primary-highlight:#313b3b;
      --color-error:#d163a7;
      --color-error-highlight:#4c3d46;
      --color-success:#6daa45;
      --color-success-highlight:#3a4435;
      --shadow-sm:0 1px 2px rgba(0,0,0,.22);
      --shadow-md:0 8px 28px rgba(0,0,0,.32);
      --shadow-lg:0 20px 48px rgba(0,0,0,.42);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:none;text-size-adjust:none;scroll-behavior:smooth}
    body{
      min-height:100dvh;
      font-family:var(--font-body);
      font-size:var(--text-base);
      line-height:1.6;
      color:var(--color-text);
      background:
        radial-gradient(ellipse 55% 40% at 10% 0%,rgba(1,105,111,.10),transparent),
        radial-gradient(ellipse 45% 35% at 90% 100%,rgba(1,105,111,.07),transparent),
        var(--color-bg);
      display:grid;
      place-items:center;
      padding:var(--space-5) var(--space-4);
    }
    img,svg{display:block;max-width:100%;height:auto}
    button{font:inherit;border:0;background:none;color:inherit;cursor:pointer}
    input{font:inherit;color:inherit}
    a{color:var(--color-primary);text-decoration:none;transition:color var(--transition)}
    a:hover{color:var(--color-primary-hover)}
    :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}

    /* ─── Layout ─── */
    .page{
      width:min(100%,460px);
      display:grid;
      gap:var(--space-6);
    }
    .brand-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:var(--space-4);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:var(--space-3);
    }
    .logo-mark{
      width:44px;height:44px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background:linear-gradient(145deg,var(--color-primary-highlight),var(--color-surface-2));
      border:1px solid color-mix(in srgb,var(--color-border) 70%,transparent);
      box-shadow:var(--shadow-sm);
      flex-shrink:0;
    }
    .logo-mark svg{width:22px;height:22px;color:var(--color-primary)}
    .wordmark{font-size:var(--text-lg);font-weight:700;letter-spacing:-.025em}

    .theme-btn{
      width:40px;height:40px;
      border-radius:50%;
      display:grid;place-items:center;
      background:color-mix(in srgb,var(--color-surface-2) 88%,transparent);
      border:1px solid color-mix(in srgb,var(--color-border) 72%,transparent);
      color:var(--color-text-muted);
      transition:color var(--transition),background var(--transition),border-color var(--transition);
    }
    .theme-btn:hover{color:var(--color-text);background:var(--color-surface-offset)}
    .theme-btn svg{width:18px;height:18px}

    /* ─── Card ─── */
    .card{
      background:color-mix(in srgb,var(--color-surface) 92%,transparent);
      border:1px solid color-mix(in srgb,var(--color-border) 72%,transparent);
      border-radius:var(--radius-2xl);
      box-shadow:var(--shadow-md);
      overflow:hidden;
      position:relative;
    }
    .card::before{
      content:"";
      position:absolute;inset:0;
      background:linear-gradient(145deg,color-mix(in srgb,var(--color-primary-highlight) 40%,transparent) 0%,transparent 45%);
      pointer-events:none;
    }

    /* ─── Tab switcher ─── */
    .tabs{
      position:relative;z-index:1;
      display:grid;grid-template-columns:1fr 1fr;
      background:color-mix(in srgb,var(--color-surface-offset) 75%,transparent);
      border-bottom:1px solid color-mix(in srgb,var(--color-divider) 80%,transparent);
    }
    .tab-btn{
      padding:var(--space-4) var(--space-3);
      font-size:var(--text-sm);
      font-weight:600;
      color:var(--color-text-muted);
      border-bottom:2px solid transparent;
      transition:color var(--transition),border-color var(--transition),background var(--transition);
      border-radius:0;
      text-align:center;
    }
    .tab-btn:hover{color:var(--color-text)}
    .tab-btn.active{
      color:var(--color-primary);
      border-bottom-color:var(--color-primary);
      background:color-mix(in srgb,var(--color-surface) 80%,transparent);
    }

    /* ─── Form panels ─── */
    .panel{
      position:relative;z-index:1;
      padding:clamp(1.25rem,3vw,2rem);
      display:none;
      flex-direction:column;
      gap:var(--space-5);
    }
    .panel.active{display:flex}

    .panel-header{display:grid;gap:var(--space-1)}
    .panel-title{font-size:var(--text-lg);font-weight:700;letter-spacing:-.02em}
    .panel-sub{font-size:var(--text-sm);color:var(--color-text-muted)}

    /* ─── Alert ─── */
    .alert{
      display:none;
      align-items:flex-start;
      gap:var(--space-3);
      padding:var(--space-3) var(--space-4);
      border-radius:var(--radius-lg);
      font-size:var(--text-sm);
      line-height:1.45;
    }
    .alert.show{display:flex}
    .alert-error{
      background:var(--color-error-highlight);
      color:var(--color-error);
      border:1px solid color-mix(in srgb,var(--color-error) 18%,transparent);
    }
    .alert-success{
      background:var(--color-success-highlight);
      color:var(--color-success);
      border:1px solid color-mix(in srgb,var(--color-success) 18%,transparent);
    }
    .alert svg{width:18px;height:18px;flex-shrink:0;margin-top:.05em}

    /* ─── Field ─── */
    .field{display:grid;gap:var(--space-2)}
    .label{
      font-size:var(--text-sm);
      font-weight:600;
      color:var(--color-text);
      display:flex;align-items:center;gap:var(--space-2);
    }
    .label .emoji{font-size:1em}
    .input-wrap{position:relative}
    .input{
      width:100%;
      min-height:48px;
      padding:0.7rem var(--space-4);
      border-radius:var(--radius-lg);
      background:var(--color-surface-2);
      border:1.5px solid color-mix(in srgb,var(--color-border) 80%,transparent);
      font-size:var(--text-sm);
      color:var(--color-text);
      transition:border-color var(--transition),box-shadow var(--transition),background var(--transition);
      outline:none;
    }
    .input::placeholder{color:var(--color-text-faint)}
    .input:focus{
      border-color:var(--color-primary);
      background:var(--color-surface);
      box-shadow:0 0 0 3px color-mix(in srgb,var(--color-primary) 14%,transparent);
    }
    .input.has-icon{padding-right:3rem}
    .input-icon-btn{
      position:absolute;right:var(--space-3);top:50%;
      transform:translateY(-50%);
      width:32px;height:32px;
      display:grid;place-items:center;
      border-radius:var(--radius-sm);
      color:var(--color-text-muted);
      transition:color var(--transition);
    }
    .input-icon-btn:hover{color:var(--color-text)}
    .input-icon-btn svg{width:18px;height:18px;pointer-events:none}
    .hint{font-size:var(--text-xs);color:var(--color-text-muted);padding-top:.1rem}

    /* ─── Button ─── */
    .btn{
      min-height:48px;
      padding:.8rem var(--space-5);
      border-radius:var(--radius-lg);
      font-size:var(--text-sm);
      font-weight:700;
      display:flex;align-items:center;justify-content:center;gap:var(--space-2);
      transition:background var(--transition),box-shadow var(--transition),transform var(--transition),border-color var(--transition);
    }
    .btn:active{transform:scale(.98)}
    .btn-primary{
      background:var(--color-primary);
      color:var(--color-text-inverse);
      box-shadow:0 2px 8px color-mix(in srgb,var(--color-primary) 30%,transparent);
    }
    .btn-primary:hover{background:var(--color-primary-hover);box-shadow:0 4px 16px color-mix(in srgb,var(--color-primary) 30%,transparent)}
    .btn-primary:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .btn-primary .spinner{display:none}
    .btn-primary.loading .spinner{display:block}
    .btn-primary.loading .btn-label{display:none}
    .spinner{
      width:18px;height:18px;
      border:2.5px solid color-mix(in srgb,currentColor 30%,transparent);
      border-top-color:currentColor;
      border-radius:50%;
      animation:spin .7s linear infinite;
    }

    /* ─── Divider ─── */
    .or-row{
      display:flex;align-items:center;gap:var(--space-3);
      color:var(--color-text-faint);font-size:var(--text-xs);
    }
    .or-line{flex:1;height:1px;background:var(--color-divider)}

    /* ─── Footer ─── */
    .footer-note{
      text-align:center;
      font-size:var(--text-xs);
      color:var(--color-text-faint);
    }

    /* ─── Password strength ─── */
    .pw-strength{margin-top:var(--space-2);display:none;gap:var(--space-2);flex-direction:column}
    .pw-strength.show{display:flex}
    .strength-bars{display:flex;gap:var(--space-1)}
    .bar{
      height:4px;flex:1;
      border-radius:var(--radius-full);
      background:var(--color-divider);
      transition:background .3s var(--ease);
    }
    .bar.filled-1{background:#a12c7b}
    .bar.filled-2{background:#da7101}
    .bar.filled-3{background:#d19900}
    .bar.filled-4{background:#437a22}
    .strength-label{font-size:var(--text-xs);color:var(--color-text-muted)}

    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:480px){
      .panel{padding:var(--space-5) var(--space-4)}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
    }
  </style>
</head>
<body>
<main class="page" role="main">

  <!-- Brand row -->
  <div class="brand-row">
    <a href="./index.html" class="brand" aria-label="FlowLedger home">
      <div class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 15h22"/><path d="M13 24h22"/><path d="M13 33h14"/>
          <path d="M36 11v26"/><path d="M32 15c0-2.2 1.8-4 4-4"/>
        </svg>
      </div>
      <span class="wordmark">FlowLedger</span>
    </a>
    <button class="theme-btn" type="button" id="themeBtn" aria-label="Toggle theme">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79"/>
      </svg>
    </button>
  </div>

  <!-- Card -->
  <div class="card" role="region" aria-label="Authentication">

    <!-- Tabs -->
    <div class="tabs" role="tablist" aria-label="Sign in or register">
      <button class="tab-btn active" role="tab" aria-selected="true" aria-controls="panel-login" id="tab-login" type="button">
        Sign in
      </button>
      <button class="tab-btn" role="tab" aria-selected="false" aria-controls="panel-register" id="tab-register" type="button">
        Create account
      </button>
    </div>

    <!-- ── LOGIN panel ── -->
    <section class="panel active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
      <div class="panel-header">
        <h1 class="panel-title">Welcome back 👋</h1>
        <p class="panel-sub">Sign in to continue managing your money.</p>
      </div>

      <div class="alert alert-error" id="loginError" role="alert" aria-live="polite">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="loginErrorMsg"></span>
      </div>

      <form id="loginForm" novalidate>
        <div style="display:grid;gap:var(--space-4)">
          <div class="field">
            <label class="label" for="loginEmail">
              <span class="emoji">✉️</span> Email address
            </label>
            <input class="input" type="email" id="loginEmail" name="email"
              placeholder="you@example.com" autocomplete="email" required />
          </div>

          <div class="field">
            <label class="label" for="loginPassword">
              <span class="emoji">🔒</span> Password
            </label>
            <div class="input-wrap">
              <input class="input has-icon" type="password" id="loginPassword" name="password"
                placeholder="Enter your password" autocomplete="current-password" required />
              <button type="button" class="input-icon-btn" id="loginPwToggle" aria-label="Show password">
                <svg id="loginPwEye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="loginBtn">
            <span class="spinner" aria-hidden="true"></span>
            <span class="btn-label">Sign in</span>
          </button>
        </div>
      </form>

      <div class="or-row" aria-hidden="true">
        <span class="or-line"></span>
        <span>or</span>
        <span class="or-line"></span>
      </div>

      <p style="text-align:center;font-size:var(--text-sm);color:var(--color-text-muted)">
        No account yet?
        <button type="button" class="link-btn" id="goRegisterLink" style="background:none;border:none;color:var(--color-primary);font-weight:600;cursor:pointer;padding:0">
          Create one free →
        </button>
      </p>
    </section>

    <!-- ── REGISTER panel ── -->
    <section class="panel" id="panel-register" role="tabpanel" aria-labelledby="tab-register">
      <div class="panel-header">
        <h1 class="panel-title">Create account ✨</h1>
        <p class="panel-sub">Free forever. No credit card. Works on any device.</p>
      </div>

      <div class="alert alert-error" id="registerError" role="alert" aria-live="polite">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="registerErrorMsg"></span>
      </div>

      <div class="alert alert-success" id="registerSuccess" role="status" aria-live="polite">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span id="registerSuccessMsg"></span>
      </div>

      <form id="registerForm" novalidate>
        <div style="display:grid;gap:var(--space-4)">
          <div class="field">
            <label class="label" for="regName">
              <span class="emoji">👤</span> Full name
            </label>
            <input class="input" type="text" id="regName" name="name"
              placeholder="Aditya Kumar" autocomplete="name" required />
          </div>

          <div class="field">
            <label class="label" for="regEmail">
              <span class="emoji">✉️</span> Email address
            </label>
            <input class="input" type="email" id="regEmail" name="email"
              placeholder="you@example.com" autocomplete="email" required />
          </div>

          <div class="field">
            <label class="label" for="regPassword">
              <span class="emoji">🔒</span> Password
            </label>
            <div class="input-wrap">
              <input class="input has-icon" type="password" id="regPassword" name="password"
                placeholder="Min. 8 characters" autocomplete="new-password"
                minlength="8" required />
              <button type="button" class="input-icon-btn" id="regPwToggle" aria-label="Show password">
                <svg id="regPwEye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="pw-strength" id="pwStrength" aria-live="polite">
              <div class="strength-bars" aria-hidden="true">
                <div class="bar" id="bar1"></div>
                <div class="bar" id="bar2"></div>
                <div class="bar" id="bar3"></div>
                <div class="bar" id="bar4"></div>
              </div>
              <span class="strength-label" id="strengthLabel"></span>
            </div>
          </div>

          <div class="field">
            <label class="label" for="regCurrency">
              <span class="emoji">💰</span> Default currency
            </label>
            <select class="input" id="regCurrency" name="currency">
              <option value="INR">🇮🇳 INR — Indian Rupee</option>
              <option value="USD">🇺🇸 USD — US Dollar</option>
              <option value="EUR">🇪🇺 EUR — Euro</option>
              <option value="GBP">🇬🇧 GBP — British Pound</option>
              <option value="JPY">🇯🇵 JPY — Japanese Yen</option>
              <option value="AED">🇦🇪 AED — UAE Dirham</option>
              <option value="SGD">🇸🇬 SGD — Singapore Dollar</option>
            </select>
            <p class="hint">You can change this later in Settings.</p>
          </div>

          <button type="submit" class="btn btn-primary" id="registerBtn">
            <span class="spinner" aria-hidden="true"></span>
            <span class="btn-label">Create my account</span>
          </button>
        </div>
      </form>

      <p style="text-align:center;font-size:var(--text-sm);color:var(--color-text-muted)">
        Already have an account?
        <button type="button" id="goLoginLink" style="background:none;border:none;color:var(--color-primary);font-weight:600;cursor:pointer;padding:0">
          Sign in →
        </button>
      </p>
    </section>

  </div><!-- /card -->

  <p class="footer-note">
    Your data is private. Stored securely in your own Supabase database.
  </p>
</main>

<script>
/* ─── Theme toggle ─── */
(function(){
  const btn = document.getElementById('themeBtn');
  const icon = document.getElementById('themeIcon');
  const root = document.documentElement;
  const SUN = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
  const MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79"/>';
  let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  const apply = t => { root.setAttribute('data-theme', t); icon.innerHTML = t === 'dark' ? SUN : MOON; };
  apply(theme);
  btn.addEventListener('click', () => { theme = theme === 'dark' ? 'light' : 'dark'; apply(theme); });
})();

/* ─── Tab switching ─── */
(function(){
  const tabLogin    = document.getElementById('tab-login');
  const tabRegister = document.getElementById('tab-register');
  const panelLogin  = document.getElementById('panel-login');
  const panelReg    = document.getElementById('panel-register');

  function activate(tab) {
    const isLogin = tab === 'login';
    tabLogin.classList.toggle('active', isLogin);
    tabRegister.classList.toggle('active', !isLogin);
    tabLogin.setAttribute('aria-selected', isLogin);
    tabRegister.setAttribute('aria-selected', !isLogin);
    panelLogin.classList.toggle('active', isLogin);
    panelReg.classList.toggle('active', !isLogin);
  }

  tabLogin.addEventListener('click', () => activate('login'));
  tabRegister.addEventListener('click', () => activate('register'));
  document.getElementById('goRegisterLink').addEventListener('click', () => activate('register'));
  document.getElementById('goLoginLink').addEventListener('click', () => activate('login'));
})();

/* ─── Password visibility toggles ─── */
(function(){
  const EYE = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  const EYE_OFF = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  function makeToggle(btnId, inputId, iconId) {
    const btn   = document.getElementById(btnId);
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    let shown = false;
    btn.addEventListener('click', () => {
      shown = !shown;
      input.type = shown ? 'text' : 'password';
      icon.innerHTML = shown ? EYE_OFF : EYE;
      btn.setAttribute('aria-label', shown ? 'Hide password' : 'Show password');
    });
  }
  makeToggle('loginPwToggle',  'loginPassword',  'loginPwEye');
  makeToggle('regPwToggle',    'regPassword',    'regPwEye');
})();

/* ─── Password strength ─── */
(function(){
  const input  = document.getElementById('regPassword');
  const wrap   = document.getElementById('pwStrength');
  const bars   = [1,2,3,4].map(i => document.getElementById('bar'+i));
  const label  = document.getElementById('strengthLabel');
  const levels = [
    { text: 'Too short',  cls: 'filled-1' },
    { text: 'Weak',       cls: 'filled-1' },
    { text: 'Fair',       cls: 'filled-2' },
    { text: 'Good',       cls: 'filled-3' },
    { text: 'Strong 💪',  cls: 'filled-4' },
  ];

  function score(pw) {
    if (pw.length < 8) return 0;
    let s = 1;
    if (pw.length >= 10) s++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
    if (/\d/.test(pw)) s++;
    if (/[^A-Za-z0-9]/.test(pw)) s++;
    return Math.min(s, 4);
  }

  input.addEventListener('input', () => {
    const pw = input.value;
    if (!pw) { wrap.classList.remove('show'); return; }
    wrap.classList.add('show');
    const s = score(pw);
    const lvl = levels[s] || levels[0];
    bars.forEach((b, i) => {
      b.className = 'bar';
      if (i < s) b.classList.add(lvl.cls);
    });
    label.textContent = lvl.text;
  });
})();

/* ─── Form helpers ─── */
function showAlert(id, msgId, message) {
  const el = document.getElementById(id);
  document.getElementById(msgId).textContent = message;
  el.classList.add('show');
}
function hideAlert(id) { document.getElementById(id).classList.remove('show'); }

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.classList.toggle('loading', loading);
  btn.disabled = loading;
}

function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

/* ─── AUTH LOGIC ─────────────────────────────────────────────────────────────
   Currently uses mock auth so the UI works before Supabase is wired.
   When you add js/supabase.js, replace the mock functions below with real calls:

   SIGN IN:
     const { data, error } = await window.flowledgerSupabase.auth
       .signInWithPassword({ email, password });

   SIGN UP:
     const { data, error } = await window.flowledgerSupabase.auth
       .signUp({ email, password, options: { data: { name, currency } } });

   Then redirect: window.location.href = './app.html';
──────────────────────────────────────────────────────────────────────────── */

/* Mock user store (replace with Supabase when ready) */
const MOCK_USERS_KEY = 'fl_mock_users';
function getMockUsers() {
  try { return JSON.parse(sessionStorage.getItem(MOCK_USERS_KEY) || '[]'); }
  catch(e) { return []; }
}
function saveMockUsers(users) {
  try { sessionStorage.setItem(MOCK_USERS_KEY, JSON.stringify(users)); } catch(e){}
}
function setMockSession(user) {
  try { sessionStorage.setItem('fl_mock_session', JSON.stringify(user)); } catch(e){}
}

async function mockSignIn(email, password) {
  await new Promise(r => setTimeout(r, 700));
  const users = getMockUsers();
  const user  = users.find(u => u.email === email && u.password === password);
  if (!user) throw new Error('Invalid email or password.');
  setMockSession(user);
  return { user };
}

async function mockSignUp(email, password, name, currency) {
  await new Promise(r => setTimeout(r, 900));
  const users = getMockUsers();
  if (users.find(u => u.email === email)) throw new Error('An account with this email already exists.');
  const user = { id: 'u_' + Date.now(), email, password, name, currency };
  users.push(user);
  saveMockUsers(users);
  setMockSession(user);
  return { user };
}

/* ─── Login form ─── */
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideAlert('loginError');

  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  if (!validateEmail(email)) {
    showAlert('loginError', 'loginErrorMsg', 'Please enter a valid email address.'); return;
  }
  if (!password) {
    showAlert('loginError', 'loginErrorMsg', 'Please enter your password.'); return;
  }

  setLoading('loginBtn', true);
  try {
    /* ── REPLACE WITH SUPABASE: ──
       const client = window.flowledgerSupabase;
       const { data, error } = await client.auth.signInWithPassword({ email, password });
       if (error) throw error;
    ── END REPLACE ── */
    await mockSignIn(email, password);
    window.location.href = './app.html';
  } catch (err) {
    showAlert('loginError', 'loginErrorMsg', err.message || 'Sign in failed. Please try again.');
    setLoading('loginBtn', false);
  }
});

/* ─── Register form ─── */
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideAlert('registerError');
  hideAlert('registerSuccess');

  const name     = document.getElementById('regName').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const currency = document.getElementById('regCurrency').value;

  if (!name)               { showAlert('registerError','registerErrorMsg','Please enter your name.'); return; }
  if (!validateEmail(email)){ showAlert('registerError','registerErrorMsg','Please enter a valid email.'); return; }
  if (password.length < 8) { showAlert('registerError','registerErrorMsg','Password must be at least 8 characters.'); return; }

  setLoading('registerBtn', true);
  try {
    /* ── REPLACE WITH SUPABASE: ──
       const client = window.flowledgerSupabase;
       const { data, error } = await client.auth.signUp({
         email, password,
         options: { data: { name, currency } }
       });
       if (error) throw error;
       if (!data.session) {
         // Email confirmation enabled — show success without redirect
         showAlert('registerSuccess','registerSuccessMsg',
           'Account created! Check your email to confirm, then sign in.');
         setLoading('registerBtn', false); return;
       }
    ── END REPLACE ── */
    await mockSignUp(email, password, name, currency);
    showAlert('registerSuccess', 'registerSuccessMsg',
      '🎉 Account created! Taking you to your dashboard…');
    setTimeout(() => { window.location.href = './app.html'; }, 1200);
  } catch (err) {
    showAlert('registerError', 'registerErrorMsg', err.message || 'Registration failed. Please try again.');
    setLoading('registerBtn', false);
  }
});

})();
