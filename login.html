<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FlowLedger — Sign In</title>
  <meta name="description" content="Sign in or create your FlowLedger account." />
  <meta name="theme-color" content="#01696f" />

  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet" />
  <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./css/login.css" />
</head>
<body>

<main class="page" role="main">

  <!-- Brand row -->
  <div class="brand-row">
    <a href="./index.html" class="brand" aria-label="FlowLedger home">
      <div class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.4"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 15h22"/>
          <path d="M13 24h22"/>
          <path d="M13 33h14"/>
          <path d="M36 11v26"/>
          <path d="M32 15c0-2.2 1.8-4 4-4"/>
        </svg>
      </div>
      <span class="wordmark">FlowLedger</span>
    </a>

    <button class="theme-btn" type="button" id="themeBtn" aria-label="Toggle theme">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" width="18" height="18" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79"/>
      </svg>
    </button>
  </div>

  <!-- Auth card -->
  <div class="card" role="region" aria-label="Authentication">

    <!-- Tab switcher -->
    <div class="tabs" role="tablist" aria-label="Sign in or register">
      <button class="tab-btn active" role="tab" aria-selected="true"
              aria-controls="panel-login" id="tab-login" type="button">
        Sign in
      </button>
      <button class="tab-btn" role="tab" aria-selected="false"
              aria-controls="panel-register" id="tab-register" type="button">
        Create account
      </button>
    </div>

    <!-- ── LOGIN PANEL ── -->
    <section class="panel active" id="panel-login"
             role="tabpanel" aria-labelledby="tab-login">

      <div class="panel-header">
        <h1 class="panel-title">Welcome back 👋</h1>
        <p class="panel-sub">Sign in to continue managing your money.</p>
      </div>

      <div class="alert alert-error hidden" id="loginError" role="alert" aria-live="polite">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             width="18" height="18" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="loginErrorMsg"></span>
      </div>

      <form id="loginForm" novalidate>
        <div class="fields">

          <div class="field">
            <label class="label" for="loginEmail">
              <span aria-hidden="true">✉️</span> Email address
            </label>
            <input class="input" type="email" id="loginEmail" name="email"
              placeholder="you@example.com" autocomplete="email" required />
          </div>

          <div class="field">
            <label class="label" for="loginPassword">
              <span aria-hidden="true">🔒</span> Password
            </label>
            <div class="input-wrap">
              <input class="input has-icon" type="password" id="loginPassword"
                name="password" placeholder="Enter your password"
                autocomplete="current-password" required />
              <button type="button" class="eye-btn" id="loginEyeBtn"
                      aria-label="Show password">
                <svg id="loginEyeIcon" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     width="18" height="18" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="loginBtn">
            <span class="spinner hidden" aria-hidden="true"></span>
            <span class="btn-label">Sign in</span>
          </button>

        </div>
      </form>

      <div class="or-row" aria-hidden="true">
        <span class="or-line"></span><span>or</span><span class="or-line"></span>
      </div>

      <p class="switch-text">
        No account yet?
        <button type="button" class="link-btn" id="goRegister">
          Create one free →
        </button>
      </p>
    </section>

    <!-- ── REGISTER PANEL ── -->
    <section class="panel hidden" id="panel-register"
             role="tabpanel" aria-labelledby="tab-register">

      <div class="panel-header">
        <h1 class="panel-title">Create account ✨</h1>
        <p class="panel-sub">Free forever. No credit card. Works on any device.</p>
      </div>

      <div class="alert alert-error hidden" id="registerError"
           role="alert" aria-live="polite">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             width="18" height="18" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="registerErrorMsg"></span>
      </div>

      <div class="alert alert-success hidden" id="registerSuccess"
           role="status" aria-live="polite">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             width="18" height="18" aria-hidden="true">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span id="registerSuccessMsg"></span>
      </div>

      <form id="registerForm" novalidate>
        <div class="fields">

          <div class="field">
            <label class="label" for="regName">
              <span aria-hidden="true">👤</span> Full name
            </label>
            <input class="input" type="text" id="regName" name="name"
              placeholder="Aditya Kumar" autocomplete="name" required />
          </div>

          <div class="field">
            <label class="label" for="regEmail">
              <span aria-hidden="true">✉️</span> Email address
            </label>
            <input class="input" type="email" id="regEmail" name="email"
              placeholder="you@example.com" autocomplete="email" required />
          </div>

          <div class="field">
            <label class="label" for="regPassword">
              <span aria-hidden="true">🔒</span> Password
            </label>
            <div class="input-wrap">
              <input class="input has-icon" type="password" id="regPassword"
                name="password" placeholder="Min. 8 characters"
                autocomplete="new-password" minlength="8" required />
              <button type="button" class="eye-btn" id="regEyeBtn"
                      aria-label="Show password">
                <svg id="regEyeIcon" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     width="18" height="18" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>

            <!-- Password strength meter -->
            <div class="pw-strength hidden" id="pwStrength" aria-live="polite">
              <div class="strength-bars" aria-hidden="true">
                <div class="bar" id="bar1"></div>
                <div class="bar" id="bar2"></div>
                <div class="bar" id="bar3"></div>
                <div class="bar" id="bar4"></div>
              </div>
              <span class="strength-label" id="strengthLabel"></span>
            </div>
          </div>

          <div class="field">
            <label class="label" for="regCurrency">
              <span aria-hidden="true">💰</span> Default currency
            </label>
            <select class="input" id="regCurrency" name="currency">
              <option value="INR">🇮🇳 INR — Indian Rupee</option>
              <option value="USD">🇺🇸 USD — US Dollar</option>
              <option value="EUR">🇪🇺 EUR — Euro</option>
              <option value="GBP">🇬🇧 GBP — British Pound</option>
              <option value="AED">🇦🇪 AED — UAE Dirham</option>
              <option value="SGD">🇸🇬 SGD — Singapore Dollar</option>
            </select>
            <p class="hint">You can change this later in Settings.</p>
          </div>

          <button type="submit" class="btn btn-primary" id="registerBtn">
            <span class="spinner hidden" aria-hidden="true"></span>
            <span class="btn-label">Create my account</span>
          </button>

        </div>
      </form>

      <p class="switch-text">
        Already have an account?
        <button type="button" class="link-btn" id="goLogin">Sign in →</button>
      </p>
    </section>

  </div><!-- /card -->

  <p class="footer-note">
    Your data is private and stored securely in your own Supabase database.
  </p>

</main>

<!-- JS files — order matters -->
<script type="module" src="./js/supabase.js"></script>
<script type="module" src="./js/login.js"></script>

</body>
</html>
